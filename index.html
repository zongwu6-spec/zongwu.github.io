<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吳縱 | 視覺設計師作品集</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --sub-text: #666666;
            --accent-color: #000000;
            --border-color: #e5e5e5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 0 40px;
            position: relative;
            animation: fadeIn 1.0s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 背景畫布設定 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* 保持在文字內容背後 */
            pointer-events: none; /* 確保滑鼠事件能穿透到底層內容 */
            opacity: 0.5; /* 設置透明度，保持簡約 */
        }

        /* 導覽列 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 32px;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--sub-text);
        }

        /* 英雄區 (Hero Section) */
        .hero {
            padding: 100px 0 80px 0;
            max-width: 900px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: -1px;
            margin-bottom: 24px;
        }

        .hero p {
            font-size: 18px;
            color: var(--sub-text);
            max-width: 650px;
        }

        /* 作品集區塊 */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            padding-bottom: 100px;
            border-bottom: 1px solid var(--border-color);
        }

        .portfolio-item {
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            background-color: rgba(255, 255, 255, 0.8); /* 避免背景動畫干擾閱讀 */
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        .portfolio-item:hover {
            transform: translateY(-8px);
        }

        .portfolio-img {
            width: 100%;
            height: 350px;
            background-color: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--sub-text);
            font-weight: 300;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
            overflow: hidden;
            position: relative;
        }

        .portfolio-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .portfolio-item:hover .portfolio-img img {
            transform: scale(1.03);
        }

        .portfolio-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .portfolio-category {
            font-size: 14px;
            color: var(--sub-text);
        }

        /* 聯絡區塊 */
        .contact {
            padding: 80px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .contact-left {
            max-width: 500px;
        }

        .contact-left h2 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .contact-left p {
            color: var(--sub-text);
            margin-bottom: 24px;
        }

        .contact-link {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-color);
            text-decoration: underline;
        }

        .social-links {
            display: flex;
            gap: 16px;
        }

        .social-links a {
            color: var(--sub-text);
            text-decoration: none;
        }

        @media (max-width: 768px) {
            body { padding: 0 20px; }
            .portfolio-grid { grid-template-columns: 1fr; }
            .contact { flex-direction: column; gap: 40px; }
            .hero h1 { font-size: 36px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="logo">WU ZONG.</div>
        <nav>
            <a href="#work">作品集</a>
            <a href="#about">關於我</a>
            <a href="#contact">聯絡</a>
        </nav>
    </header>

    <section class="hero">
        <h1>以視覺設計傳遞品牌價值，創造多元數位體驗。</h1>
        <p>4年視覺設計經驗的設計師，專注於品牌識別、線上營銷與 AIGC 輔助設計。擅長將專案需求轉化為有效的視覺解決方案。</p>
    </section>

    <section class="portfolio-grid" id="work">
        <div class="portfolio-item">
            <div class="portfolio-img">項目一 圖片</div>
            <div class="portfolio-title">橙天嘉禾劇場視覺設計</div>
            <div class="portfolio-category">活動識別 / 劇場展覽與文創設計</div>
        </div>

        <div class="portfolio-item">
            <div class="portfolio-img">項目二 圖片</div>
            <div class="portfolio-title">Foodaily 每日食品品牌識別</div>
            <div class="portfolio-category">線下展會視覺 / UI與小程序設計</div>
        </div>
    </section>

    <section class="contact" id="contact">
        <div class="contact-left">
            <h2>讓我們一起創造<br>下一個出色的設計</h2>
            <p>如果您有任何品牌設計、營銷宣傳或是 IP 衍生設計的合作需求，歡迎隨時與我聯繫。</p>
            <a class="contact-link" href="mailto:2601886747@qq.com">2601886747@qq.com</a>
        </div>
        <div class="social-links">
            <a href="tel:15052891579">致電</a>
            <span>150-5289-1579</span>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // 設定畫布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 粒子陣列
        const particles = [];
        const particleCount = Math.floor(window.innerWidth / 15); // 自動適應屏幕

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = (Math.random() - 0.5) * 0.6;
                this.radius = Math.random() * 1.5 + 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // 邊界反彈
                if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
                if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#000000'; // 黑色粒子
                ctx.fill();
            }
        }

        // 初始化粒子
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // 動畫循環
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 更新並繪製粒子
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                // 繪製連線效果
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 0, 0, ${0.15 - distance / 1000})`; // 隨距離漸變
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
