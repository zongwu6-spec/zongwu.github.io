<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Study | 橙天嘉禾剧场</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .comparison-slider { position: relative; width: 100%; height: 60vh; overflow: hidden; border-radius: 1rem; }
        .after-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .before-img { position: absolute; top: 0; left: 0; width: 50%; height: 100%; border-right: 3px solid #fff; z-index: 10; overflow: hidden; }
        .before-img img { width: 100vw; height: 60vh; object-fit: cover; filter: grayscale(100%) brightness(0.6); }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-6">
        <a href="index.html" class="text-sm font-bold tracking-widest hover:opacity-50 transition uppercase">← Back</a>
        <div class="text-xs font-mono uppercase text-zinc-500">Case Study 01</div>
    </nav>

    <header class="pt-40 pb-20 px-8 max-w-6xl mx-auto">
        <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter mb-8 italic">Orange Sky<br>Golden Harvest</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 mt-20 border-t border-zinc-800 pt-10">
            <div>
                <p class="text-zinc-500 text-xs uppercase mb-2 font-bold tracking-widest">Role</p>
                <p class="text-lg">视觉设计师 / 空间监制</p>
            </div>
            <div>
                <p class="text-zinc-500 text-xs uppercase mb-2 font-bold tracking-widest">Services</p>
                <p class="text-lg">品牌全案 / Rhino建模 / 动态视觉</p>
            </div>
            <div>
                <p class="text-zinc-500 text-xs uppercase mb-2 font-bold tracking-widest">Date</p>
                <p class="text-lg">2024.03 - 2025.01</p>
            </div>
        </div>
    </header>

    <section class="px-8 py-20 max-w-6xl mx-auto">
        <p class="mb-6 text-zinc-400 font-medium">设计推演：从 Rhino 模型到现场落地 (拖动滑块查看对比)</p>
        <div class="comparison-slider" id="slider">
            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&q=80&w=2000" class="after-img">
            <div class="before-img" id="before-box">
                <img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&q=80&w=2000">
            </div>
        </div>
    </section>

    <section class="py-20 px-8 grid grid-cols-2 md:grid-cols-4 gap-4 max-w-6xl mx-auto">
        <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&q=80&w=800" class="rounded-lg">
        <img src="https://images.unsplash.com/photo-1550684847-75bdda21cc95?auto=format&fit=crop&q=80&w=800" class="rounded-lg mt-10">
        <img src="https://images.unsplash.com/photo-1550684848-86a5d8727436?auto=format&fit=crop&q=80&w=800" class="rounded-lg">
        <img src="https://images.unsplash.com/photo-1550684847-15273574944d?auto=format&fit=crop&q=80&w=800" class="rounded-lg mt-10">
    </section>

    <footer class="py-40 text-center">
        <p class="text-zinc-600 mb-6">NEXT PROJECT</p>
        <a href="index.html" class="text-5xl font-black uppercase hover:italic transition-all">Minions IP Campaign →</a>
    </footer>

    <script>
        const slider = document.getElementById('slider');
        const beforeBox = document.getElementById('before-box');
        slider.addEventListener('mousemove', (e) => {
            let x = e.pageX - slider.offsetLeft;
            beforeBox.style.width = (x / slider.offsetWidth) * 100 + "%";
        });
        // 移动端支持
        slider.addEventListener('touchmove', (e) => {
            let x = e.touches[0].pageX - slider.offsetLeft;
            beforeBox.style.width = (x / slider.offsetWidth) * 100 + "%";
        });
    </script>
</body>
</html>
